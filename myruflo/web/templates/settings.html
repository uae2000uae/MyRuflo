{% extends "base.html" %}
{% block title %}Settings - MyRuflo{% endblock %}
{% block content %}
<div class="page page-narrow">
    <header class="page-header">
        <h1>Settings</h1>
    </header>

    <section class="card">
        <h2>Profile</h2>
        <form id="profileForm" class="stacked-form">
            <label>Display name
                <input type="text" name="name" value="{{ user.name }}" required>
            </label>
            <p class="text-muted">Email: {{ user.email }}</p>
            <p class="form-success" id="profileSuccess" hidden>Saved.</p>
            <button type="submit" class="btn btn-primary">Save name</button>
        </form>
    </section>

    <section class="card">
        <h2>Change password</h2>
        <form id="passwordForm" class="stacked-form">
            <label>Current password
                <input type="password" name="current_password" required autocomplete="current-password">
            </label>
            <label>New password
                <input type="password" name="new_password" required minlength="8" autocomplete="new-password">
            </label>
            <p class="form-error" id="passwordError" hidden></p>
            <p class="form-success" id="passwordSuccess" hidden>Password updated.</p>
            <button type="submit" class="btn btn-primary">Update password</button>
        </form>
    </section>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById("profileForm").addEventListener("submit", async function (event) {
    event.preventDefault();
    const form = event.target;
    const successEl = document.getElementById("profileSuccess");
    successEl.hidden = true;
    const response = await fetch("/settings/profile", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: form.name.value }),
    });
    if (response.ok) {
        successEl.hidden = false;
    }
});

document.getElementById("passwordForm").addEventListener("submit", async function (event) {
    event.preventDefault();
    const form = event.target;
    const errorEl = document.getElementById("passwordError");
    const successEl = document.getElementById("passwordSuccess");
    errorEl.hidden = true;
    successEl.hidden = true;
    const response = await fetch("/settings/password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            current_password: form.current_password.value,
            new_password: form.new_password.value,
        }),
    });
    if (!response.ok) {
        const data = await response.json().catch(() => ({}));
        errorEl.textContent = data.detail || "Could not update password.";
        errorEl.hidden = false;
        return;
    }
    successEl.hidden = false;
    form.reset();
});
</script>
{% endblock %}
